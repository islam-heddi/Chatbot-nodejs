openapi: 3.0.0

info:
  title: Chatbot backend
  description: API documentation using Swagger YAML
  version: 1.0.0

servers:
  - url: http://localhost:8000

tags:
  - name: Users
    description: User management endpoints
  - name: No name
    description: test the api

paths:
  /api/:
    get:
      tags:
        - No name
      summary: simple message
      responses:
        "200":
          description: simple message

  /api/users:
    get:
      tags:
        - Users
      summary: Get all users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

    post:
      tags:
        - Users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: User created

components:
  schemas:
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
      required:
        - name
        - email
