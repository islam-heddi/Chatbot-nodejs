openapi: 3.0.0

info:
  title: Chatbot backend
  description: API documentation using Swagger YAML
  version: 1.0.0

servers:
  - url: http://localhost:5000

tags:
  - name: Users
    description: User management endpoints
  - name: Chat
    description: Chat management endpoints
  - name: Messages
    description: Message management endpoints
  - name: AI
    description: AI management endpoints

paths:
  /api/user/login:
    post:
      tags:
        - Users
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: User created
        "404":
          description: Email not found
        "401":
          description: Invalid password
  /api/user/register:
    post:
      tags:
        - Users
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: User created
        "500":
          description: Internal server error
  /api/user/signout:
    delete:
      tags:
        - Users
      summary: sign out a user
      responses:
        "200":
          description: User sign out
        "500":
          description: Internal server error
  /api/user/getAuth:
    get:
      tags:
        - Users
      summary: get authenticated user based on the JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "200":
          description: User returned
        "500":
          description: Internal server error
  /api/user/:
      get:
        tags:
          - Users
        summary: get all users
        requestBody:
          required: true
          array: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        responses:
          "200":
            description: User returned
          "500":
            description: Internal server error
  /api/user/updatePassword:
      patch:
        tags:
          - Users
        summary: update the user password
        requestBody:
          required: true
          array: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        responses:
          "200":
            description: password changed successfully
          "404":
            description: user id not found
          "404":
            description: email not found
          "401":
            description: password does not match
          "500":
            description: Internal server error
  /api/user/updateInformation:
      patch:
        tags:
          - Users
        summary: update the user information
        requestBody:
          required: true
          array: true
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        responses:
          "200":
            description: user changed successfully
          "404":
            description: user id not found
          "404":
            description: email not found
          "401":
            description: password invalid
          "500":
            description: Internal server error


  /api/chat/get:
    get:
      tags:
        - Chat
      summary: get all the chats by user id
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Chat"
      responses:
        "200":
          description: Chats returned
        "404":
          description: User not found
        "500":
          description: Internal server error
  /api/chat/create:
    post:
      tags:
        - Chat
      summary: create new chat
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Chat"
      responses:
        "201":
          description: Chat created
        "404":
          description: User not found
        "500":
         description: Internal server error
  /api/chat/update:
    patch:
      tags:
        - Chat
      summary: update chat
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Chat"
      responses:
        "200":
          description: update chat
        "404":
          description: User not found
        "500":
          description: Internal server error
  /api/chat/delete/:id:
    delete:
      tags:
        - Chat
      summary: delete chat
      requestBody:
        required: true
        array: true
        content:
          application/json:
            chat deleted
      responses:
        "200":
          description: chat deleted
        "404":
          description: User not found
        "500":
          description: Internal server error
  
  /api/message/get/:id:
    get:
      tags:
        - Messages
      summary: get all the messages by message id
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "200":
          description: messages returned
        "500":
          description: Internal server error
  /api/message/getChatMessage/:chatId:
    get:
      tags:
        - Messages
      summary: get all the messages by chat id
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "200":
          description: messages returned
        "500":
          description: Internal server error
  /api/message/getUserMesage:
    get:
      tags:
        - Messages
      summary: get all the messages by user id
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "200":
          description: messages returned
        "500":
          description: Internal server error
  /api/message/prompt:
    post:
      tags:
        - Messages
      summary: get all the messages by user id
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
      responses:
        "201":
          description: messages returned
        "404":
          description: chat not found
        "500":
          description: Internal server error
  
  /api/ai/prompt:
    post:
      tags:
        - AI
      summary: prompt a new message to the llm
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ai"
      responses:
        "200":
          description: prompt returned
        "500":
          description: Internal server error
  /api/ai/titlePrompt:
    post:
      tags:
        - AI
      summary: let the llm send a brief title without description for the new first message in the chat
      requestBody:
        required: true
        array: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ai"
      responses:
        "200":
          description: prompt returned
        "500":
          description: Internal server error

components:
  schemas:
    User:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password
    Chat:
      type: object
      properties:
        name:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - userId
        - name
    Message:
      type: object
      properties:
        content:
          type: string
        chatId:
          type: string
        senderId:
          type: string
        role:
          type: string
          enum:
            - System
            - User
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - content
        - email
        - role
    ai:
      type: object
      properties:
        chatMsg:
          type: string

